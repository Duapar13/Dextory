services:
  dextory:
    build: .
    container_name: dextory
    restart: unless-stopped
    ports:
      - "8020:8020"
    volumes:
      - dextory-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=8020
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8020/auth/me').then(r=>process.exit(r.ok||r.status===401?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  dextory-data:
